<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Emotion App</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .box {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      font-size: 16px;
      border-radius: 8px;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

    .result-card {
      background: #e8f5e9;
      padding: 12px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>🐱 Cat Emotion App</h1>

  <!-- 言語 -->
  <div class="box">
    <label>言語</label>
    <select id="langSelect">
      <option value="ja">日本語</option>
      <option value="en">English</option>
      <option value="th">ไทย</option>
    </select>
  </div>

  <!-- 写真 -->
  <div class="box">
    <h2>写真でみる</h2>
    <input type="file" id="imageInput" accept="image/*">
    <img id="preview" style="display:none;">
  </div>

  <!-- 手動選択 -->
  <div class="box">
    <h2>手動でえらぶ</h2>
    <p>猫の状態を選んでください</p>

    <div id="manualArea"></div>
  </div>

  <!-- 結果 -->
  <div class="box">
    <div id="result"></div>
  </div>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
