<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Emotion App</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <h1 id="appTitle">🐱 猫の気持ちアプリ</h1>

  <div class="card">
    <label id="languageLabel">言語</label>
    <select id="langSelect">
      <option value="ja">日本語</option>
      <option value="en">English</option>
      <option value="th">ไทย</option>
    </select>
  </div>

  <div class="card">
    <h2 id="photoTitle">写真でみる</h2>

    <label id="fileLabel" for="imageInput">ファイルを選択</label>
    <input type="file" id="imageInput" accept="image/*">

    <p id="fileStatus">ファイル未選択</p>

    <div id="preview"></div>
  </div>

  <div class="card">
    <h2 id="manualTitle">手動でえらぶ</h2>
    <p id="manualDescription">見える部分だけ選べばOK</p>

    <div id="manualArea"></div>
  </div>

  <div id="result"></div>

  <div id="history" class="card"></div>

  <script src="app.js"></script>

</body>
</html>
